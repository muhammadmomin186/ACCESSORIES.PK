<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>accessories.pk — Premium Tech Accessories</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0a0a0a;
  --bg-card: #111111;
  --bg-surface: #1a1a1a;
  --text-primary: #ffffff;
  --text-secondary: #a0a0a0;
  --text-muted: #6b6b6b;
  --accent: #ff6b6b;
  --border: rgba(255, 255, 255, 0.08);
  --border-light: rgba(255, 255, 255, 0.12);
  --gradient-gold: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-surface); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

.topbar {
  background: var(--accent);
  color: #fff;
  padding: 0;
  overflow: hidden;
  height: 38px;
  display: flex;
  align-items: center;
}
.topbar-track {
  display: flex;
  align-items: center;
  white-space: nowrap;
  animation: marqueeScroll 28s linear infinite;
}
@keyframes marqueeScroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.topbar-item { font-size: 12px; font-weight: 500; padding: 0 32px; }
.topbar-sep { color: rgba(255,255,255,0.5); margin: 0 5px; }

header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(10, 10, 10, 0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
  gap: 24px;
}
.logo {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  font-weight: 400;
  cursor: pointer;
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.search-wrap {
  flex: 1;
  max-width: 420px;
  display: flex;
  align-items: center;
  border: 1px solid var(--border-light);
  border-radius: 40px;
  background: var(--bg-surface);
  height: 44px;
  padding: 0 20px;
  gap: 10px;
}
.search-wrap input {
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  width: 100%;
}
.header-icons { display: flex; gap: 12px; }
.icon-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  border-radius: 40px;
  background: var(--bg-surface);
  border: 1px solid var(--border-light);
  cursor: pointer;
  color: var(--text-primary);
  transition: all 0.3s;
}
.icon-btn:hover { background: var(--accent); border-color: var(--accent); }
.badge, .wish-badge {
  background: var(--accent);
  border-radius: 50%;
  padding: 2px 6px;
  font-size: 10px;
  margin-left: 5px;
}
.wish-badge { display: none; }

.desktop-nav-wrapper {
  background: rgba(10, 10, 10, 0.9);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.desktop-nav {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  overflow-x: auto;
}
.desktop-nav-btn {
  padding: 14px 24px;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-weight: 500;
  transition: all 0.3s;
}
.desktop-nav-btn:hover, .desktop-nav-btn.active { color: var(--accent); }

.hero { position: relative; width: 100%; overflow: hidden; }
.hero-slider { position: relative; height: clamp(400px, 55vw, 650px); }
.hero-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.7s ease;
  display: flex;
  align-items: center;
}
.hero-slide.active { opacity: 1; z-index: 1; }
.hero-slide img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.hero-slide-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(100deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.3) 55%, transparent 100%);
  z-index: 2;
}
.hero-content {
  position: relative;
  z-index: 3;
  padding: 0 80px;
  max-width: 600px;
}
.hero-kicker {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--accent);
  margin-bottom: 16px;
  display: block;
}
.hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 5vw, 56px);
  margin-bottom: 20px;
  color: #fff;
}
.hero p {
  color: rgba(255,255,255,0.75);
  margin-bottom: 28px;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 12px 30px;
  border-radius: 40px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s;
}
.btn-primary:hover { transform: scale(1.05); }
.hero-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  cursor: pointer;
  z-index: 10;
}
.hero-arrow-left { left: 20px; }
.hero-arrow-right { right: 20px; }
.hero-dots {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 10;
}
.hero-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  cursor: pointer;
  border: none;
}
.hero-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }

.promo-cards-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}
@media (max-width: 768px) { .promo-cards-inner { grid-template-columns: repeat(2, 1fr); } }
.promo-card-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 24px;
  background: var(--bg-card);
  border-right: 1px solid var(--border);
}
.pci-icon { font-size: 26px; }
.pci-text strong { display: block; font-size: 13px; }
.pci-text span { font-size: 11px; color: var(--text-muted); }

.page-container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
.page { display: none; }
.page.active { display: block; }
.section { padding: 60px 0; }
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
}
.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  font-weight: 400;
}
.see-all { color: var(--accent); cursor: pointer; font-size: 13px; }

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 2px;
  background: var(--border);
}
.prod-card {
  background: var(--bg-card);
  cursor: pointer;
  transition: all 0.3s;
  overflow: hidden;
}
.prod-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.prod-img-wrap {
  aspect-ratio: 1;
  background: var(--bg-surface);
  position: relative;
  overflow: hidden;
}
.prod-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.prod-card:hover .prod-img-wrap img { transform: scale(1.05); }
.prod-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  z-index: 2;
}
.badge-new { background: #1a4a7a; }
.badge-hot { background: #e67e22; }
.badge-gift { background: #8e44ad; }
.wish-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: none;
  color: #fff;
  cursor: pointer;
  opacity: 0;
  transition: all 0.3s;
  z-index: 2;
}
.prod-card:hover .wish-btn { opacity: 1; }
.wish-btn.liked { opacity: 1; color: var(--accent); }
.prod-info { padding: 16px; }
.prod-brand { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
.prod-name { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.price-now { font-size: 16px; font-weight: 700; color: var(--accent); }
.add-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  color: #fff;
  cursor: pointer;
  transition: all 0.3s;
}
.add-btn:hover { background: var(--accent); }
.prod-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }

.feature-banner {
  position: relative;
  height: clamp(300px, 40vw, 500px);
  overflow: hidden;
  margin: 40px 0;
}
.feature-banner img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.fb-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 70%);
}
.fb-content {
  position: relative;
  z-index: 2;
  padding: 0 80px;
  max-width: 560px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.fb-eyebrow { color: var(--accent); font-size: 11px; letter-spacing: 3px; margin-bottom: 12px; }
.fb-heading { font-family: 'DM Serif Display', serif; font-size: clamp(28px, 4vw, 48px); color: #fff; margin-bottom: 16px; }
.fb-sub { color: rgba(255,255,255,0.7); margin-bottom: 24px; }
.fb-btn {
  background: var(--accent);
  color: #fff;
  padding: 12px 28px;
  border-radius: 40px;
  border: none;
  cursor: pointer;
  width: fit-content;
}

.spotlight-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
  background: var(--border);
}
@media (max-width: 768px) { .spotlight-grid { grid-template-columns: repeat(2, 1fr); } }
.spotlight-card {
  position: relative;
  aspect-ratio: 3/4;
  overflow: hidden;
  cursor: pointer;
}
.spotlight-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s;
}
.spotlight-card:hover img { transform: scale(1.06); }
.sc-label {
  position: absolute;
  inset: 0;
  background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 55%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 20px;
}
.sc-cat { color: var(--accent); font-size: 10px; letter-spacing: 2px; margin-bottom: 6px; }
.sc-name { font-family: 'DM Serif Display', serif; font-size: 20px; color: #fff; }

.promise-strip { background: var(--bg-card); padding: 40px 24px; margin-top: 60px; }
.promise-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px;
  text-align: center;
}
.promise-icon { font-size: 28px; margin-bottom: 12px; }
.promise-title { font-weight: 600; margin-bottom: 4px; }
.promise-sub { font-size: 12px; color: var(--text-muted); }

.admin-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-surface);
  padding: 8px 24px 0;
  border-bottom: 1px solid var(--border);
}
.admin-tab {
  padding: 12px 28px;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s;
  border-bottom: 2px solid transparent;
}
.admin-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.admin-container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.admin-card {
  background: var(--bg-card);
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-bottom: 24px;
  overflow: hidden;
}
.admin-card-header {
  background: var(--bg-surface);
  padding: 16px 20px;
  font-weight: 700;
  border-bottom: 1px solid var(--border);
}
.admin-card-body { padding: 20px; }
.admin-input, .admin-select, .admin-textarea {
  width: 100%;
  padding: 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  color: var(--text-primary);
  margin-bottom: 12px;
}
.slider-img-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.slider-img-preview {
  width: 60px;
  height: 60px;
  border-radius: 8px;
  background: var(--bg-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.slider-img-preview img { width: 100%; height: 100%; object-fit: cover; }
.slider-img-url { flex: 1; min-width: 200px; padding: 8px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); }
.upload-btn {
  padding: 6px 12px;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}
.upload-btn:hover { border-color: var(--accent); color: var(--accent); }
.upload-btn input { display: none; }
.slider-add-btn {
  width: 100%;
  padding: 10px;
  border: 1px dashed var(--border-light);
  background: none;
  cursor: pointer;
  border-radius: 8px;
  color: var(--text-secondary);
  transition: all 0.3s;
}
.slider-add-btn:hover { border-color: var(--accent); color: var(--accent); }
.admin-prod-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.prod-emoji { font-size: 28px; width: 50px; }
.prod-info-admin { flex: 1; }
.prod-actions button {
  padding: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-left: 5px;
}
.edit-btn { background: none; border: 1px solid var(--border); color: var(--text-primary); }
.delete-btn { background: none; border: 1px solid var(--accent); color: var(--accent); }

.cart-sidebar {
  display: none;
  position: fixed;
  top: 0;
  right: 0;
  width: 400px;
  height: 100%;
  background: var(--bg-card);
  z-index: 300;
  padding: 24px;
  overflow-y: auto;
  border-left: 1px solid var(--border);
}
.cart-sidebar.active { display: block; }
.cart-item { display: flex; gap: 12px; margin-bottom: 16px; padding: 12px; background: var(--bg-surface); border-radius: 12px; }
.cart-item-image { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
.city-selector { display: flex; gap: 12px; margin: 16px 0; }
.city-btn {
  flex: 1;
  padding: 10px;
  border-radius: 30px;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-primary);
  cursor: pointer;
}
.city-btn.active { background: var(--accent); border-color: var(--accent); }
.checkout-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 40px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
}
.wa-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 400;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}
.wa-overlay.open { opacity: 1; pointer-events: all; }
.wa-modal {
  background: var(--bg-card);
  max-width: 480px;
  width: 90%;
  border-radius: 20px;
  padding: 28px;
  border: 1px solid var(--border);
}
.wa-input {
  width: 100%;
  padding: 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  margin-bottom: 12px;
}
.wa-btn {
  width: 100%;
  padding: 14px;
  background: #25D366;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
}
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #fff;
  padding: 12px 24px;
  border-radius: 40px;
  opacity: 0;
  transition: 0.3s;
  z-index: 500;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  padding: 8px 0;
  z-index: 200;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 10px;
  color: var(--text-muted);
  cursor: pointer;
}
.nav-item.active { color: var(--accent); }
@media (max-width: 768px) {
  .bottom-nav { display: flex; }
  .desktop-nav-wrapper { display: none; }
  .header-top { flex-wrap: wrap; height: auto; padding: 12px 0; }
  .search-wrap { max-width: 100%; order: 3; }
  .hero-content { padding: 0 20px; }
  .fb-content { padding: 0 20px; }
}
footer { background: var(--bg-card); padding: 48px 24px; margin-top: 40px; text-align: center; border-top: 1px solid var(--border); }

/* ── Color Variants ── */
.color-variants-section { margin: 10px 0; }
.color-variant-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-dark); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
}
.color-swatch-preview {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0; cursor: pointer;
}
.color-name-input { flex: 1; }
.color-hex-input { width: 90px; }
.color-imgs-wrap { flex: 2; }
.color-img-thumbs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.color-img-thumb {
  position: relative; width: 48px; height: 48px;
  border-radius: 6px; overflow: hidden; border: 1px solid var(--border);
}
.color-img-thumb img { width: 100%; height: 100%; object-fit: cover; }
.color-img-thumb .remove-thumb {
  position: absolute; top: 1px; right: 2px;
  background: rgba(0,0,0,0.7); color: white;
  border: none; cursor: pointer; font-size: 10px; border-radius: 50%;
  width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
}
.add-color-img-btn {
  width: 48px; height: 48px; border-radius: 6px;
  border: 1px dashed var(--border-light); background: var(--bg-surface);
  color: var(--text-muted); cursor: pointer; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
}

/* ── Detail page color swatches ── */
.detail-colors { margin: 18px 0; }
.detail-colors-label { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
.detail-swatches { display: flex; gap: 10px; flex-wrap: wrap; }
.detail-swatch {
  width: 34px; height: 34px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: all 0.2s; position: relative;
}
.detail-swatch.active { border-color: #fff; transform: scale(1.15); }
.detail-swatch:hover { transform: scale(1.1); }
.detail-swatch-tooltip {
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
  background: var(--bg-surface); color: var(--text-primary);
  padding: 4px 8px; border-radius: 6px; font-size: 11px; white-space: nowrap;
  pointer-events: none; opacity: 0; transition: opacity 0.2s;
}
.detail-swatch:hover .detail-swatch-tooltip { opacity: 1; }

/* ── Detail image gallery ── */
.detail-gallery { display: flex; flex-direction: column; gap: 12px; }
.detail-main-img {
  width: 100%; aspect-ratio: 1; border-radius: 14px;
  object-fit: cover; background: var(--bg-surface);
  transition: opacity 0.25s;
}
.detail-thumbs { display: flex; gap: 8px; flex-wrap: wrap; }
.detail-thumb {
  width: 64px; height: 64px; border-radius: 8px;
  object-fit: cover; cursor: pointer; border: 2px solid transparent;
  transition: all 0.2s; background: var(--bg-surface);
}
.detail-thumb.active { border-color: var(--accent); }
.selected-color-name { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }

</style>
</head>
<body>

<div class="topbar"><div class="topbar-track" id="topbarTrack"></div></div>

<header>
