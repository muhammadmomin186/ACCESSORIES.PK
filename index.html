<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ACCESSORIES.PK - Premium Mobile Accessories</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Toast Notifications -->
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #ffffff;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 10px;
        }
        
        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.5);
        }
        
        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        /* Skeleton Loader */
        .skeleton {
            background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }
        
        /* Mobile Bottom Navigation */
        .mobile-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            display: none;
            z-index: 1000;
        }
        
        @media (max-width: 768px) {
            .mobile-bottom-nav {
                display: flex;
                justify-content: space-around;
            }
        }
        
        /* Product Card */
        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.15);
        }
        
        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #8b5cf6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
        }
    </style>
</head>

</nav>

<!-- Main Content -->
<main id="app" class="min-h-screen pb-20 md:pb-0">
    <!-- Content will be dynamically loaded here -->
</main>

<!-- Cart Modal -->
<div id="cartModal" class="modal">
    <div class="modal-content bg-gray-900 rounded-2xl p-6 max-w-md w-full mx-4">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold text-white">Your Cart</h2>
            <button onclick="closeCart()" class="text-gray-400 hover:text-white">
                <i class="fas fa-times text-2xl"></i>
            </button>
        </div>
        <div id="cartItems" class="max-h-96 overflow-y-auto mb-4"></div>
        <div class="border-t border-gray-700 pt-4">
            <div class="flex justify-between mb-4">
                <span class="text-gray-400">Total:</span>
                <span id="cartTotal" class="text-2xl font-bold text-purple-400">PKR 0</span>
            </div>
            <button onclick="checkoutOnWhatsApp()" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-lg font-semibold hover:scale-105 transition">

            </button>
        </div>

</div>

<script>
    // ==================== FIREBASE CONFIGURATION ====================
    // IMPORTANT: Replace these with your actual Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDV0vixhWwV8IsPgOBvOHlW2YwyoGESrh8",
        authDomain: "accessories-pk.firebaseapp.com",
        projectId: "accessories-pk",
        storageBucket: "accessories-pk.firebasestorage.app",
        appId: "1:273150355491:web:4d6eebd5d71d45acb4e996"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    // Admin credentials (only for demo - change these)
    const ADMIN_EMAIL = "admin@accessories.pk";
    const ADMIN_PASSWORD = "Admin@123456";
    
    // ==================== GLOBAL STATE ====================
    let currentPage = 'home';
    let products = [];
    let categories = [];
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    let currentUser = null;
    let settings = {
        storeName: "ACCESSORIES.PK",
        whatsappNumber: "923000000000",
        supportEmail: "support@accessories.pk"
    };
    
    // ==================== HELPER FUNCTIONS ====================
    function showToast(message, type = 'success') {
        Toastify({
            text: message,
            duration: 3000,
            gravity: "top",
            position: "center",
            style: {
                background: type === 'success' ? 'linear-gradient(135deg, #8b5cf6, #ec4899)' : '#ef4444',
                borderRadius: '10px',
            }
        }).showToast();
    }
    
    function updateCartCount() {
        document.getElementById('cartCount').textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
        localStorage.setItem('cart', JSON.stringify(cart));
    }
    
    function addToCart(product) {
        const existing = cart.find(item => item.id === product.id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        updateCartCount();
        showToast(`${product.name} added to cart!`);
    }
    
    function toggleCart() {
        const modal = document.getElementById('cartModal');
        if (modal.classList.contains('active')) {
            closeCart();
        } else {
            renderCart();
            modal.classList.add('active');
        }
    }
    
    function closeCart() {
        document.getElementById('cartModal').classList.remove('active');
    }
    
    function renderCart() {
        const cartItemsDiv = document.getElementById('cartItems');
        let total = 0;
        
        if (cart.length === 0) {
            cartItemsDiv.innerHTML = '<p class="text-gray-400 text-center py-8">Your cart is empty</p>';
            document.getElementById('cartTotal').textContent = 'PKR 0';
            return;
        }
        
        cartItemsDiv.innerHTML = cart.map(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            return `
                <div class="flex gap-4 mb-4 p-3 glass-card">
                    <img src="${item.image}" alt="${item.name}" class="w-20 h-20 object-cover rounded-lg" onerror="this.src='https://via.placeholder.com/400?text=No+Image'">
                    <div class="flex-1">
                        <h3 class="font-semibold">${item.name}</h3>
                        <p class="text-purple-400">PKR ${item.price}</p>
                        <div class="flex items-center gap-2 mt-2">
                            <button onclick="updateQuantity('${item.id}', -1)" class="px-2 py-1 bg-gray-700 rounded">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity('${item.id}', 1)" class="px-2 py-1 bg-gray-700 rounded">+</button>
                            <button onclick="removeFromCart('${item.id}')" class="ml-auto text-red-400">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.getElementById('cartTotal').textContent = `PKR ${total}`;
    }
    
    function updateQuantity(productId, delta) {
        const item = cart.find(i => i.id === productId);
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) {
                cart = cart.filter(i => i.id !== productId);
            }
            updateCartCount();
            renderCart();
        }
    }
    
    function removeFromCart(productId) {
        cart = cart.filter(i => i.id !== productId);
        updateCartCount();
        renderCart();
    }
    
    function checkoutOnWhatsApp() {
        if (cart.length === 0) {
            showToast('Cart is empty!', 'error');
            return;
        }
        
        let message = `Hello ACCESSORIES.PK,%0AI want to order:%0A%0A`;
        cart.forEach(item => {
            message += `Product: ${item.name}%0APrice: PKR ${item.price}%0AQuantity: ${item.quantity}%0A%0A`;
        });
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        message += `Total Amount: PKR ${total}%0A%0AThank you!`;
        
        const whatsappUrl = `https://wa.me/${settings.whatsappNumber}?text=${message}`;
        window.open(whatsappUrl, '_blank');
    }
    
    // ==================== FIREBASE CRUD OPERATIONS ====================
    async function loadProducts() {
        try {
            const snapshot = await db.collection('products').orderBy('createdAt', 'desc').get();
            products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            if (currentPage === 'home') renderHome();
            else if (currentPage === 'shop') renderShop();
        } catch (error) {
            console.error('Error loading products:', error);
            // Fallback demo products if Firebase is not configured
            products = getDemoProducts();
            if (currentPage === 'home') renderHome();
            else if (currentPage === 'shop') renderShop();
        }
    }
    
    async function loadCategories() {
        try {
            const snapshot = await db.collection('categories').get();
            categories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        } catch (error) {
            categories = getDemoCategories();
        }
        if (currentPage === 'home') renderHome();
    }
    
    async function loadSettings() {
        try {
            const doc = await db.collection('settings').doc('storeInfo').get();
            if (doc.exists) settings = doc.data();
        } catch (error) {
            console.log('Using default settings');
        }
    }
    
    async function addProduct(product) {
        try {
            await db.collection('products').add({
                ...product,
                createdAt: new Date().toISOString()
            });
            showToast('Product added successfully!');
            loadProducts();
        } catch (error) {
            showToast('Error adding product', 'error');
        }
    }
    
    async function updateProduct(id, data) {
        try {
            await db.collection('products').doc(id).update(data);
            showToast('Product updated!');
            loadProducts();
        } catch (error) {
            showToast('Error updating product', 'error');
        }
    }
    
    async function deleteProduct(id) {
        if (confirm('Are you sure?')) {
            try {
                await db.collection('products').doc(id).delete();
                showToast('Product deleted!');
                loadProducts();
            } catch (error) {
                showToast('Error deleting product', 'error');
            }
        }
    }
    
    // ==================== DEMO DATA (Fallback if Firebase not configured) ====================
    function getDemoProducts() {
        return [
            { id: '1', name: 'Fast Charger 65W', price: 2499, description: 'Ultra-fast charging for all devices', category: 'Chargers', image: 'https://images.unsplash.com/photo-1583863788434-e58a36330cd0?w=400', stock: 50, featured: true },
            { id: '2', name: 'Wireless Earbuds Pro', price: 4999, description: 'Premium sound with noise cancellation', category: 'Earbuds', image: 'https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=400', stock: 30, featured: true },
            { id: '3', name: 'Over-Ear Headphones', price: 8999, description: 'Studio quality sound', category: 'Headphones', image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400', stock: 20, featured: true },
            { id: '4', name: 'Portable Speaker', price: 5999, description: '360° surround sound', category: 'Speakers', image: 'https://images.unsplash.com/photo-1545454675-3531b543be5d?w=400', stock: 25, featured: false },
            { id: '5', name: 'Power Bank 20000mAh', price: 3999, description: 'Fast charging power bank', category: 'Power Banks', image: 'https://images.unsplash.com/photo-1609592425402-3b6d9000a163?w=400', stock: 40, featured: true },
            { id: '6', name: 'Type-C Data Cable', price: 599, description: 'Braided durable cable', category: 'Data Cables', image: 'https://images.unsplash.com/photo-1545127398-14699f92334b?w=400', stock: 100, featured: false }
        ];
    }
    
    function getDemoCategories() {
        return [
            { id: '1', name: 'Chargers', image: 'https://images.unsplash.com/photo-1583863788434-e58a36330cd0?w=400' },
            { id: '2', name: 'Earbuds', image: 'https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=400' },
            { id: '3', name: 'Headphones', image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400' },
            { id: '4', name: 'Speakers', image: 'https://images.unsplash.com/photo-1545454675-3531b543be5d?w=400' },
            { id: '5', name: 'Power Banks', image: 'https://images.unsplash.com/photo-1609592425402-3b6d9000a163?w=400' },
            { id: '6', name: 'Data Cables', image: 'https://images.unsplash.com/photo-1545127398-14699f92334b?w=400' }
        ];
    }
    
    // ==================== PAGE RENDERING ====================
    function navigateTo(page) {
        currentPage = page;
        if (page === 'home') renderHome();
        else if (page === 'shop') renderShop();
        else if (page === 'contact') renderContact();
        else if (page === 'admin') renderAdminLogin();
        else if (page === 'admin-dashboard') renderAdminDashboard();
        
        // Update active nav link
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('text-purple-400');
            link.classList.add('text-gray-300');
        });
    }
    
    function renderHome() {
        const featured = products.filter(p => p.featured).slice(0, 6);
        const newArrivals = products.slice(0, 8);
        
        const html = `
            <!-- Hero Section -->
            <section class="relative min-h-[90vh] flex items-center justify-center overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-br from-purple-900/20 via-black to-black"></div>
                <div class="relative z-10 text-center px-4 max-w-6xl mx-auto animate-fade-in">
                    <h1 class="text-5xl md:text-7xl font-bold bg-gradient-to-r from-white via-purple-400 to-pink-400 bg-clip-text text-transparent mb-6">
                        ACCESSORIES.PK
                    </h1>
                    <p class="text-xl md:text-2xl text-gray-300 mb-8">Premium Mobile Accessories for the Modern Lifestyle</p>
                    <button onclick="navigateTo('shop')" class="inline-flex items-center px-8 py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-full text-white font-semibold hover:scale-105 transition shadow-2xl">
                        Shop Now
                        <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </section>
            
            <!-- Categories -->
            <section class="py-16 px-4 max-w-7xl mx-auto">
                <h2 class="text-3xl md:text-4xl font-bold text-white mb-8 text-center">Shop by Category</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                    ${categories.map(cat => `
                        <div class="glass-card p-4 text-center cursor-pointer hover:scale-105 transition" onclick="filterByCategory('${cat.name}')">
                            <img src="${cat.image}" alt="${cat.name}" class="w-full h-32 object-cover rounded-lg mb-3" onerror="this.src='https://via.placeholder.com/400?text=${cat.name}'">
                            <h3 class="font-semibold text-white">${cat.name}</h3>
                        </div>
                    `).join('')}
                </div>
            </section>
            
            <!-- Featured Products -->
            <section class="py-16 px-4 max-w-7xl mx-auto">
                <h2 class="text-3xl md:text-4xl font-bold text-white mb-8 text-center">Featured Products</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    ${featured.map(product => renderProductCard(product)).join('')}
                </div>
            </section>
            
            <!-- Why Choose Us -->
            <section class="py-16 bg-gradient-to-br from-gray-900 to-black">
                <div class="max-w-7xl mx-auto px-4">
                    <h2 class="text-3xl md:text-4xl font-bold text-white mb-12 text-center">Why Choose Us</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                        ${[
                            { icon: 'fa-truck', title: 'Free Shipping', desc: 'On orders over PKR 5000' },
                            { icon: 'fa-shield-alt', title: '2 Year Warranty', desc: 'On all products' },
                            { icon: 'fa-headphones', title: '24/7 Support', desc: 'Customer first approach' },
                            { icon: 'fa-bolt', title: 'Genuine Products', desc: '100% authentic' }
                        ].map(item => `
                            <div class="text-center group">
                                <div class="w-20 h-20 mx-auto mb-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-full flex items-center justify-center group-hover:scale-110 transition">
                                    <i class="fas ${item.icon} text-3xl text-white"></i>
                                </div>
                                <h3 class="text-xl font-semibold text-white mb-2">${item.title}</h3>
                                <p class="text-gray-400">${item.desc}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </section>
            
            <!-- New Arrivals -->
            <section class="py-16 px-4 max-w-7xl mx-auto">
                <h2 class="text-3xl md:text-4xl font-bold text-white mb-8 text-center">New Arrivals</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    ${newArrivals.map(product => renderProductCard(product)).join('')}
                </div>
            </section>
        `;
        
        document.getElementById('app').innerHTML = html;
    }
    
    function renderProductCard(product) {
        return `
            <div class="product-card glass-card p-4 cursor-pointer" onclick="viewProduct('${product.id}')">
                <img src="${product.image}" alt="${product.name}" class="w-full h-48 object-cover rounded-lg mb-4" loading="lazy" onerror="this.src='https://via.placeholder.com/400?text=Product'">
                <h3 class="font-semibold text-lg mb-2">${product.name}</h3>
                <p class="text-purple-400 text-xl font-bold mb-2">PKR ${product.price}</p>
                <p class="text-gray-400 text-sm mb-3">${product.description?.substring(0, 60)}...</p>
                <div class="flex gap-2">
                    <button onclick="event.stopPropagation(); addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')})" class="flex-1 bg-gradient-to-r from-purple-600 to-pink-600 py-2 rounded-lg font-semibold hover:scale-105 transition">
                        <i class="fas fa-cart-plus mr-2"></i> Add to Cart
                    </button>
                </div>
            </div>
        `;
    }
    
    function renderShop() {
        const html = `
            <div class="max-w-7xl mx-auto px-4 py-8">
                <h1 class="text-4xl font-bold text-white mb-8">All Products</h1>
                
                <!-- Filters -->
                <div class="flex flex-wrap gap-4 mb-8">
                    <input type="text" id="searchInput" placeholder="Search products..." class="px-4 py-2 bg-gray-800 rounded-lg text-white flex-1 min-w-[200px]">
                    <select id="categoryFilter" class="px-4 py-2 bg-gray-800 rounded-lg text-white">
                        <option value="">All Categories</option>
                        ${categories.map(cat => `<option value="${cat.name}">${cat.name}</option>`).join('')}
                    </select>
                    <select id="sortFilter" class="px-4 py-2 bg-gray-800 rounded-lg text-white">
                        <option value="default">Default</option>
                        <option value="price-asc">Price: Low to High</option>
                        <option value="price-desc">Price: High to Low</option>
                    </select>
                </div>
                
                <!-- Products Grid -->
                <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    ${products.map(product => renderProductCard(product)).join('')}
                </div>
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        
        // Add event listeners
        document.getElementById('searchInput').addEventListener('input', filterProducts);
        document.getElementById('categoryFilter').addEventListener('change', filterProducts);
        document.getElementById('sortFilter').addEventListener('change', filterProducts);
    }
    
    function filterProducts() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const category = document.getElementById('categoryFilter').value;
        const sort = document.getElementById('sortFilter').value;
        
        let filtered = products.filter(p => {
            const matchesSearch = p.name.toLowerCase().includes(searchTerm);
            const matchesCategory = !category || p.category === category;
            return matchesSearch && matchesCategory;
        });
        
        if (sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
        else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
        
        const grid = document.getElementById('productsGrid');
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-8">No products found</div>';
        } else {
            grid.innerHTML = filtered.map(product => renderProductCard(product)).join('');
        }
    }
    
    function viewProduct(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        
        const related = products.filter(p => p.category === product.category && p.id !== productId).slice(0, 4);
        
        const html = `
            <div class="max-w-7xl mx-auto px-4 py-8">
                <button onclick="navigateTo('shop')" class="mb-6 text-purple-400 hover:text-purple-300">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Shop
                </button>
                
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="glass-card p-4">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-auto rounded-lg" onerror="this.src='https://via.placeholder.com/600?text=Product'">
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold text-white mb-4">${product.name}</h1>
                        <p class="text-purple-400 text-3xl font-bold mb-4">PKR ${product.price}</p>
                        <p class="text-gray-300 mb-6">${product.description || 'Premium quality product with warranty'}</p>
                        <div class="mb-6">
                            <span class="px-3 py-1 ${product.stock > 0 ? 'bg-green-600' : 'bg-red-600'} rounded-full text-sm">
                                ${product.stock > 0 ? 'In Stock' : 'Out of Stock'}
                            </span>
                        </div>
                        <button onclick="addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')})" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-3 rounded-lg font-semibold hover:scale-105 transition mb-4">
                            <i class="fas fa-cart-plus mr-2"></i> Add to Cart
                        </button>
                        <button onclick="checkoutNow(${JSON.stringify(product).replace(/"/g, '&quot;')})" class="w-full bg-gradient-to-r from-green-500 to-green-600 py-3 rounded-lg font-semibold hover:scale-105 transition">
                            <i class="fab fa-whatsapp mr-2"></i> Buy Now on WhatsApp
                        </button>
                    </div>
                </div>
                
                ${related.length > 0 ? `
                    <div class="mt-16">
                        <h2 class="text-2xl font-bold text-white mb-6">Related Products</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            ${related.map(p => renderProductCard(p)).join('')}
                        </div>
                    </div>
                ` : ''}
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
    }
    
    function checkoutNow(product) {
        const message = `Hello ACCESSORIES.PK,%0AI want to order:%0AProduct: ${product.name}%0APrice: PKR ${product.price}%0AQuantity: 1%0A%0AThank you!`;
        window.open(`https://wa.me/${settings.whatsappNumber}?text=${message}`, '_blank');
    }
    
    function filterByCategory(category) {
        navigateTo('shop');
        setTimeout(() => {
            const filter = document.getElementById('categoryFilter');
            if (filter) filter.value = category;
            filterProducts();
        }, 100);
    }
    
    function renderContact() {
        const html = `
            <div class="max-w-7xl mx-auto px-4 py-8">
                <h1 class="text-4xl font-bold text-white mb-8 text-center">Contact Us</h1>
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="glass-card p-6">
                        <h2 class="text-2xl font-bold text-white mb-6">Get in Touch</h2>
                        <div class="space-y-4">
                            <div class="flex items-center gap-4 p-4 glass-card">
                                <i class="fab fa-whatsapp text-3xl text-green-500"></i>
                                <div>
                                    <p class="text-gray-400">WhatsApp</p>
                                    <p class="text-white font-semibold">${settings.whatsappNumber}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-4 p-4 glass-card">
                                <i class="fas fa-envelope text-3xl text-purple-400"></i>
                                <div>
                                    <p class="text-gray-400">Email</p>
                                    <p class="text-white font-semibold">${settings.supportEmail}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="glass-card p-6">
                        <h2 class="text-2xl font-bold text-white mb-6">Business Hours</h2>
                        <div class="space-y-3">
                            <div class="flex justify-between">
                                <span class="text-gray-400">Monday - Friday</span>
                                <span class="text-white">9:00 AM - 9:00 PM</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">Saturday</span>
                                <span class="text-white">10:00 AM - 8:00 PM</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">Sunday</span>
                                <span class="text-white">12:00 PM - 6:00 PM</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
    }
    
    function renderAdminLogin() {
        const html = `
            <div class="min-h-screen flex items-center justify-center px-4 py-20">
                <div class="glass-card p-8 max-w-md w-full">
                    <h1 class="text-3xl font-bold text-white mb-6 text-center">Admin Login</h1>
                    <form onsubmit="adminLogin(event)">
                        <div class="mb-4">
                            <label class="block text-gray-300 mb-2">Email</label>
                            <input type="email" id="adminEmail" class="w-full px-4 py-2 bg-gray-800 rounded-lg text-white" required>
                        </div>
                        <div class="mb-6">
                            <label class="block text-gray-300 mb-2">Password</label>
                            <input type="password" id="adminPassword" class="w-full px-4 py-2 bg-gray-800 rounded-lg text-white" required>
                        </div>
                        <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-3 rounded-lg font-semibold hover:scale-105 transition">
                            Login
                        </button>
                    </form>
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
    }
    
    function adminLogin(event) {
        event.preventDefault();
        const email = document.getElementById('adminEmail').value;
        const password = document.getElementById('adminPassword').value;
        
        if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
            currentUser = { email };
            showToast('Login successful!');
            renderAdminDashboard();
        } else {
            showToast('Invalid credentials', 'error');
        }
    }
    
    function renderAdminDashboard() {
        const html = `
            <div class="max-w-7xl mx-auto px-4 py-8">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-3xl font-bold text-white">Admin Dashboard</h1>
                    <button onclick="adminLogout()" class="px-4 py-2 bg-red-600 rounded-lg hover:bg-red-700 transition">
                        <i class="fas fa-sign-out-alt mr-2"></i> Logout
                    </button>
                </div>
                
                <!-- Add Product Form -->
                <div class="glass-card p-6 mb-8">
                    <h2 class="text-2xl font-bold text-white mb-4">Add New Product</h2>
                    <form onsubmit="handleAddProduct(event)" class="grid md:grid-cols-2 gap-4">
                        <input type="text" id="prodName" placeholder="Product Name" class="px-4 py-2 bg-gray-800 rounded-lg text-white" required>
                        <input type="number" id="prodPrice" placeholder="Price (PKR)" class="px-4 py-2 bg-gray-800 rounded-lg text-white" required>
                        <input type="text" id="prodCategory" placeholder="Category" class="px-4 py-2 bg-gray-800 rounded-lg text-white" required>
                        <input type="text" id="prodImage" placeholder="Image URL" class="px-4 py-2 bg-gray-800 rounded-lg text-white" required>
                        <textarea id="prodDesc" placeholder="Description" class="px-4 py-2 bg-gray-800 rounded-lg text-white md:col-span-2" rows="3"></textarea>
                        <input type="number" id="prodStock" placeholder="Stock" class="px-4 py-2 bg-gray-800 rounded-lg text-white" required>
                        <div class="flex items-center gap-4">
                            <label class="text-gray-300">
                                <input type="checkbox" id="prodFeatured"> Featured Product
                            </label>
                        </div>
                        <button type="submit" class="md:col-span-2 bg-gradient-to-r from-purple-600 to-pink-600 py-2 rounded-lg font-semibold hover:scale-105 transition">
                            Add Product
                        </button>
                    </form>
                </div>
                
                <!-- Products List -->
                <div class="glass-card p-6">
                    <h2 class="text-2xl font-bold text-white mb-4">Manage Products</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-800">
                                <tr>
                                    <th class="px-4 py-3 text-left">Product</th>
                                    <th class="px-4 py-3 text-left">Price</th>
                                    <th class="px-4 py-3 text-left">Stock</th>
                                    <th class="px-4 py-3 text-left">Featured</th>
                                    <th class="px-4 py-3 text-left">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${products.map(product => `
                                    <tr class="border-b border-gray-700">
                                        <td class="px-4 py-3">
                                            <div class="flex items-center gap-3">
                                                <img src="${product.image}" class="w-10 h-10 object-cover rounded" onerror="this.src='https://via.placeholder.com/100'">
                                                <span>${product.name}</span>
                                            </div>
                                        </td>
                                        <td class="px-4 py-3">PKR ${product.price}</td>
                                        <td class="px-4 py-3">
                                            <input type="number" value="${product.stock}" onchange="updateStock('${product.id}', this.value)" class="w-20 px-2 py-1 bg-gray-800 rounded">
                                        </td>
                                        <td class="px-4 py-3">
                                            <button onclick="toggleFeatured('${product.id}', ${!product.featured})" class="px-3 py-1 ${product.featured ? 'bg-green-600' : 'bg-gray-600'} rounded text-sm">
                                                ${product.featured ? 'Featured' : 'Not Featured'}
                                            </button>
                                        </td>
                                        <td class="px-4 py-3">
                                            <button onclick="deleteProduct('${product.id}')" class="text-red-400 hover:text-red-300">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
    }
    
    function handleAddProduct(event) {
        event.preventDefault();
        const product = {
            name: document.getElementById('prodName').value,
            price: parseInt(document.getElementById('prodPrice').value),
            category: document.getElementById('prodCategory').value,
            image: document.getElementById('prodImage').value,
            description: document.getElementById('prodDesc').value,
            stock: parseInt(document.getElementById('prodStock').value),
            featured: document.getElementById('prodFeatured').checked
        };
        
        addProduct(product);
        event.target.reset();
    }
    
    function updateStock(productId, newStock) {
        updateProduct(productId, { stock: parseInt(newStock) });
    }
    
    function toggleFeatured(productId, featured) {
        updateProduct(productId, { featured });
    }
    
    function adminLogout() {
        currentUser = null;
        showToast('Logged out');
        navigateTo('home');
    }
    
    // ==================== INITIALIZATION ====================
    async function init() {
        await loadSettings();
        await loadProducts();
        await loadCategories();
        navigateTo('home');
        updateCartCount();
    }
    
    // Start the app
    init();
</script>
